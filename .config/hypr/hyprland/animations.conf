animations {
    enabled = true

    # Animation curves (保持作者的精心调教不变)
    bezier = specialWorkSwitch, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = standard, 0.2, 0, 0, 1

    # Animation configs (延长渲染时间，喂饱 60Hz)
    animation = layersIn, 1, 7, emphasizedDecel, slide       # 原 5 改 7
    animation = layersOut, 1, 6, emphasizedAccel, slide      # 原 4 改 6
    animation = fadeLayers, 1, 7, standard                   # 原 5 改 7

    animation = windowsIn, 1, 7, emphasizedDecel             # 原 5 改 7
    animation = windowsOut, 1, 5, emphasizedAccel            # 原 3 改 5 (太快容易像闪退)
    animation = windowsMove, 1, 8, standard                  # 原 6 改 8 (拖动窗口更顺滑)
    animation = workspaces, 1, 7, standard                   # 原 5 改 7 (切换工作区更从容)

    animation = specialWorkspace, 1, 6, specialWorkSwitch, slidefadevert 15% # 原 4 改 6

    animation = fade, 1, 8, standard                         # 原 6 改 8
    animation = fadeDim, 1, 8, standard                      # 原 6 改 8
    animation = border, 1, 8, standard                       # 原 6 改 8
}
